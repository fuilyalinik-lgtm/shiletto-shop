<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Message Test</title>
    <style>
        .chat-messages { padding: 10px; border: 1px solid #ccc; max-height: 400px; overflow-y: auto; }
        .chat-message { margin-bottom: 10px; padding: 8px; border-radius: 8px; }
        .chat-user { background: #e3f2fd; margin-left: auto; max-width: 80%; }
        .chat-admin { background: #f5f5f5; margin-right: auto; max-width: 80%; }
        .message-html { margin-top: 5px; }
        .order-receipt { border: 1px solid #e6ecf0; border-radius: 14px; background: #ffffff; padding: 0.75rem; font-size: 0.95rem; color: #242f40; }
        .order-receipt-header { font-weight: 700; margin-bottom: 0.75rem; letter-spacing: 0.02em; }
        .order-receipt-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.55rem 0; }
        .order-receipt-img { width: 44px; height: 44px; object-fit: contain; border-radius: 6px; }
        .order-receipt-item-content { flex: 1; }
        .order-receipt-item-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .order-receipt-item-meta { font-size: 0.8rem; color: #666; }
        .order-receipt-item-price { font-weight: 600; }
        .order-receipt-total { display: flex; justify-content: space-between; align-items: center; padding-top: 0.75rem; border-top: 1px solid #e6ecf0; margin-top: 0.75rem; font-weight: 700; }
    </style>
</head>
<body>
    <h1>Тест отображения HTML-сообщений в чате</h1>
    <div id="chatMessages" class="chat-messages"></div>

    <script>
        // Тестовые сообщения
        const messages = [
            {
                id: 1,
                sender: 'admin',
                message: 'Вітаю! Мене звати Влад, я менеджер інтернет-магазину SHILETTO SHOP. Чим можу допомогти?',
                created_at: new Date().toISOString()
            },
            {
                id: 2,
                sender: 'user',
                message: 'Хочу оформить заказ',
                created_at: new Date().toISOString()
            },
            {
                id: 3,
                sender: 'user',
                message: `<div class="order-receipt">
    <div class="order-receipt-header">Чек замовлення</div>
    <div class="order-receipt-item">
        <img class="order-receipt-img" src="https://via.placeholder.com/44x44" alt="Test Product">
        <div class="order-receipt-item-content">
            <div class="order-receipt-item-title">Test Product 1</div>
            <div class="order-receipt-item-meta">1 × 100 грн</div>
        </div>
        <div class="order-receipt-item-price">100 грн</div>
    </div>
    <div class="order-receipt-total">
        <span>Загальна сума</span>
        <strong>100 грн</strong>
    </div>
</div>`,
                created_at: new Date().toISOString()
            }
        ];

        function renderChatMessages(messages) {
            const chatMessagesContainer = document.getElementById('chatMessages');
            if (!chatMessagesContainer) return;
            
            chatMessagesContainer.innerHTML = messages.map(msg => {
                const cssClass = msg.sender === 'admin' ? 'chat-admin' : 'chat-user';
                
                // Проверяем, содержит ли сообщение HTML
                const isHtmlMessage = msg.message.includes('<div') || msg.message.includes('<span') || msg.message.includes('<strong') || msg.message.includes('order-receipt');
                const messageContent = isHtmlMessage ? 
                    `<div class="message-html">${msg.message}</div>` : 
                    `<span class="message-text">${msg.message}</span>`;
                    
                return `<div class="chat-message ${cssClass}" data-message-id="${msg.id}">
                            <strong>${msg.sender === 'admin' ? 'Менеджер' : 'Вы'}:</strong> ${messageContent}
                            <div style="font-size:0.75rem; color:#888; margin-top:0.2rem;">${new Date(msg.created_at).toLocaleString()}</div>
                        </div>`;
            }).join('');
        }

        // Рендерим сообщения
        renderChatMessages(messages);
        console.log('Messages rendered');
    </script>
</body>
</html>
